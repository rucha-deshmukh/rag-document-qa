# Render blueprint — one-click deploy.
# In the Render dashboard: New → Blueprint → connect this repo. Render reads
# this file and provisions the Postgres instance and the web service. After the
# first deploy, set ANTHROPIC_API_KEY and OPENAI_API_KEY in the service's
# Environment tab (they are intentionally not stored in the repo).
services:
  - type: web
    name: rag-document-qa
    runtime: docker
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: rag-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: rag-db
    plan: free
    postgresMajorVersion: "16"
